<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <!-- data-sveltekit-preload-data="hover" starts preloading page data on link hover,
         making navigations feel instant. SvelteKit replaces this div's contents on the client. -->
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
