services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: curated
      POSTGRES_PASSWORD: curated
      POSTGRES_DB: curated_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curated -d curated_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  typesense:
    image: typesense/typesense:27.1
    restart: unless-stopped
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    command: >
      --data-dir=/data
      --api-key=local-dev-key
      --enable-cors
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8108' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  migrate:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
      target: development
    working_dir: /app/apps/backend
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://curated:curated@postgres:5432/curated_dev
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma migrate deploy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
      target: development
    restart: unless-stopped
    working_dir: /app/apps/backend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - ./apps/backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://curated:curated@postgres:5432/curated_dev
      REDIS_URL: redis://redis:6379
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: "8108"
      TYPESENSE_API_KEY: local-dev-key
      TYPESENSE_PROTOCOL: http
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      typesense:
        condition: service_healthy
    command: npm run dev

  worker:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
      target: development
    restart: unless-stopped
    working_dir: /app/apps/backend
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - ./apps/backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://curated:curated@postgres:5432/curated_dev
      REDIS_URL: redis://redis:6379
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: "8108"
      TYPESENSE_API_KEY: local-dev-key
      TYPESENSE_PROTOCOL: http
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      typesense:
        condition: service_healthy
    command: npm run worker

volumes:
  postgres_data:
  redis_data:
  typesense_data:
